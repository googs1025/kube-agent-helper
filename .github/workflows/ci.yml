name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Unit tests with coverage
        run: |
          go test $(go list ./... | grep -v test/envtest | grep -v test/e2e) \
            -race -count=1 -timeout=120s \
            -coverprofile=coverage.out -covermode=atomic

      - name: Generate coverage report
        if: always()
        run: |
          echo '## Go Test Coverage' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.out', 'utf8');
            const { execSync } = require('child_process');
            const report = execSync('go tool cover -func=coverage.out').toString();
            const totalLine = report.split('\n').find(l => l.includes('total:'));
            const total = totalLine ? totalLine.match(/[\d.]+%/)?.[0] : 'unknown';

            // Build per-package summary
            const lines = report.trim().split('\n');
            const pkgMap = new Map();
            for (const line of lines) {
              if (line.includes('total:')) continue;
              const match = line.match(/^(.+?)\s+\S+\s+([\d.]+%)/);
              if (match) {
                const pkg = match[1].replace('github.com/kube-agent-helper/kube-agent-helper/', '');
                if (!pkgMap.has(pkg)) pkgMap.set(pkg, []);
                pkgMap.get(pkg).push(match[2]);
              }
            }

            let table = '| Package | Functions | Avg Coverage |\n|---------|-----------|-------------|\n';
            const pkgSet = new Set();
            for (const line of lines) {
              if (line.includes('total:')) continue;
              const match = line.match(/^(\S+)\s/);
              if (match) {
                const pkg = match[1].replace('github.com/kube-agent-helper/kube-agent-helper/', '');
                const dir = pkg.substring(0, pkg.lastIndexOf('/'));
                if (dir && !pkgSet.has(dir)) {
                  pkgSet.add(dir);
                  const funcs = lines.filter(l => l.includes(match[1].substring(0, match[1].lastIndexOf('/'))));
                  const pcts = funcs.map(f => parseFloat(f.match(/([\d.]+)%/)?.[1] || '0'));
                  const avg = pcts.length ? (pcts.reduce((a,b) => a+b, 0) / pcts.length).toFixed(1) : '0';
                  table += `| ${dir} | ${pcts.length} | ${avg}% |\n`;
                }
              }
            }

            const body = [
              '## 📊 Go Test Coverage Report',
              '',
              `**Total: ${total}**`,
              '',
              '<details><summary>Per-function details</summary>',
              '',
              '```',
              report.split('\n').slice(-21).join('\n'),
              '```',
              '</details>',
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Go Test Coverage Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  envtest:
    name: Integration Tests (envtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Download kubebuilder assets
        run: setup-envtest use --bin-dir ${{ github.workspace }}/bin/envtest

      - name: Run envtest
        run: go test ./test/envtest/... -v -count=1 -timeout=120s

  e2e-backend:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Backend E2E tests
        run: go test ./test/e2e/ -tags=e2e -v -count=1 -timeout=120s

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build controller
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/controller ./cmd/controller

      - name: Build MCP server
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/k8s-mcp-server ./cmd/main.go

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Type check
        working-directory: dashboard
        run: npm run typecheck

      - name: Unit tests with coverage
        working-directory: dashboard
        run: npx vitest run --reporter=verbose --coverage

      - name: Dashboard coverage summary
        if: always()
        working-directory: dashboard
        run: |
          echo '## Dashboard Test Coverage' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + fmt(s.statements) + ' |');
              console.log('| Branches | ' + fmt(s.branches) + ' |');
              console.log('| Functions | ' + fmt(s.functions) + ' |');
              console.log('| Lines | ' + fmt(s.lines) + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build
        working-directory: dashboard
        run: npm run build

  python-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify all Python files parse
        run: |
          find agent-runtime -name '*.py' | while read f; do
            python3 -c "import ast; ast.parse(open('$f').read())" || exit 1
            echo "  OK: $f"
          done

  python-test:
    name: Agent Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: agent-runtime
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: agent-runtime
        run: |
          PYTHONPATH=. python -m pytest tests/ -v \
            --cov=runtime \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Agent runtime coverage summary
        if: always()
        working-directory: agent-runtime
        run: |
          echo '## Agent Runtime Test Coverage' >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          line_rate = float(root.get('line-rate', 0)) * 100
          branch_rate = float(root.get('branch-rate', 0)) * 100
          print('| Metric | Coverage |')
          print('|--------|----------|')
          print(f'| Lines | {line_rate:.1f}% |')
          print(f'| Branches | {branch_rate:.1f}% |')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const xml = fs.readFileSync('agent-runtime/coverage.xml', 'utf8');
            const lineRate = parseFloat(xml.match(/line-rate="([\d.]+)"/)?.[1] ?? '0') * 100;
            const branchRate = parseFloat(xml.match(/branch-rate="([\d.]+)"/)?.[1] ?? '0') * 100;
            const body = [
              '## 🐍 Agent Runtime Test Coverage',
              '',
              `**Lines: ${lineRate.toFixed(1)}% | Branches: ${branchRate.toFixed(1)}%**`,
              '',
              'Full report available in the [Actions artifact](../actions/runs/${{ github.run_id }}).',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Agent Runtime Test Coverage'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-runtime-coverage
          path: agent-runtime/htmlcov/
          retention-days: 7

  skill-lint:
    name: Skill File Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill frontmatter
        run: |
          set -e
          ERRORS=0
          for f in skills/*.md; do
            name=$(sed -n 's/^name: //p' "$f")
            dimension=$(sed -n 's/^dimension: //p' "$f")
            tools=$(sed -n 's/^tools: //p' "$f")
            requires_data=$(sed -n 's/^requires_data: //p' "$f")
            if [ -z "$name" ] || [ -z "$dimension" ] || [ -z "$tools" ] || [ -z "$requires_data" ]; then
              echo "FAIL: $f missing required frontmatter (name/dimension/tools/requires_data)"
              ERRORS=$((ERRORS+1))
            else
              echo "OK:   $f (name=$name, dimension=$dimension)"
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi

  crd-check:
    name: CRD Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest

      - name: Regenerate CRDs from types.go
        run: controller-gen crd paths="./internal/controller/api/..." output:crd:dir=deploy/crds

      - name: Check deploy/crds is up to date
        run: |
          if ! git diff --exit-code deploy/crds/; then
            echo "::error::deploy/crds/ is out of date with types.go. Run: controller-gen crd paths=./internal/controller/api/... output:crd:dir=deploy/crds"
            exit 1
          fi

      - name: Check Helm CRDs match deploy/crds
        run: |
          if ! diff deploy/crds/ deploy/helm/templates/crds/; then
            echo "::error::deploy/helm/templates/crds/ differs from deploy/crds/. Run: cp deploy/crds/*.yaml deploy/helm/templates/crds/"
            exit 1
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build controller image
        run: docker build -f Dockerfile -t controller:ci .

      - name: Build agent-runtime image
        run: docker build -f agent-runtime/Dockerfile -t agent-runtime:ci .

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm

  smoke-test:
    name: Smoke Test (kind)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: smoke

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Apply CRDs
        run: kubectl apply -f deploy/helm/templates/crds/

      - name: Verify CRDs registered
        run: |
          kubectl wait --for=condition=Established crd/diagnosticruns.k8sai.io --timeout=30s
          kubectl wait --for=condition=Established crd/diagnosticskills.k8sai.io --timeout=30s
          kubectl wait --for=condition=Established crd/modelconfigs.k8sai.io --timeout=30s
          kubectl wait --for=condition=Established crd/diagnosticfixes.k8sai.io --timeout=30s

      - name: Build controller binary
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/controller ./cmd/controller

      - name: Build MCP server binary
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/k8s-mcp-server ./cmd/main.go

      - name: Create DiagnosticSkill CR
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: k8sai.io/v1alpha1
          kind: DiagnosticSkill
          metadata:
            name: pod-health-analyst
          spec:
            dimension: health
            description: "Analyzes pod health"
            prompt: "Check pod status"
            tools: ["kubectl_get"]
            enabled: true
            priority: 100
          EOF

      - name: Verify DiagnosticSkill created
        run: kubectl get diagnosticskills pod-health-analyst -o jsonpath='{.spec.dimension}' | grep health

      - name: Create DiagnosticRun CR
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: k8sai.io/v1alpha1
          kind: DiagnosticRun
          metadata:
            name: smoke-test
          spec:
            target:
              scope: namespace
              namespaces: ["default"]
            skills: ["pod-health-analyst"]
            modelConfigRef: "anthropic-credentials"
            timeoutSeconds: 300
            outputLanguage: zh
          EOF

      - name: Verify DiagnosticRun created
        run: |
          kubectl get diagnosticrun smoke-test -o jsonpath='{.spec.target.scope}' | grep namespace
          kubectl get diagnosticrun smoke-test -o jsonpath='{.spec.timeoutSeconds}' | grep 300
          kubectl get diagnosticrun smoke-test -o jsonpath='{.spec.outputLanguage}' | grep zh

      - name: Create DiagnosticFix CR (patch strategy)
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: k8sai.io/v1alpha1
          kind: DiagnosticFix
          metadata:
            name: smoke-fix
          spec:
            diagnosticRunRef: "smoke-test"
            findingTitle: "Test finding"
            findingID: "finding-123"
            target:
              kind: Deployment
              namespace: default
              name: nginx
            strategy: dry-run
            approvalRequired: true
            patch:
              type: strategic-merge
              content: '{"spec":{"replicas":2}}'
          EOF

      - name: Verify DiagnosticFix created
        run: |
          kubectl get diagnosticfix smoke-fix -o jsonpath='{.spec.strategy}' | grep dry-run
          kubectl get diagnosticfix smoke-fix -o jsonpath='{.spec.findingID}' | grep finding-123

      - name: Create DiagnosticFix CR (create strategy)
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: k8sai.io/v1alpha1
          kind: DiagnosticFix
          metadata:
            name: smoke-fix-create
          spec:
            diagnosticRunRef: "smoke-test"
            findingTitle: "Missing NetworkPolicy"
            findingID: "finding-456"
            target:
              kind: NetworkPolicy
              namespace: default
              name: default-deny
            strategy: create
            approvalRequired: true
            patch:
              type: strategic-merge
              content: '{"apiVersion":"networking.k8s.io/v1","kind":"NetworkPolicy","metadata":{"name":"default-deny","namespace":"default"},"spec":{"podSelector":{}}}'
          EOF

      - name: Verify create-strategy Fix
        run: kubectl get diagnosticfix smoke-fix-create -o jsonpath='{.spec.strategy}' | grep create

      - name: Helm template renders
        run: |
          helm template test-release deploy/helm \
            --set anthropic.secretName=test-secret \
            --namespace test-ns | kubectl apply --dry-run=client -f -

      - name: Cleanup
        if: always()
        run: |
          kubectl delete diagnosticfix smoke-fix smoke-fix-create --ignore-not-found
          kubectl delete diagnosticrun smoke-test --ignore-not-found
          kubectl delete diagnosticskill pod-health-analyst --ignore-not-found