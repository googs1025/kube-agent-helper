apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-controller
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-controller
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-controller
      containers:
      - name: controller
        image: {{ .Values.image.controller }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - --http-addr={{ .Values.controller.httpAddr }}
        - --db={{ .Values.controller.dbPath }}
        - --agent-image={{ .Values.image.agent }}
        - --controller-url={{ .Values.controller.controllerURL | default (printf "http://%s.%s.svc.cluster.local:8080" .Release.Name .Release.Namespace) }}
        - --skills-dir=/skills
        {{- if .Values.anthropic.baseURL }}
        - --anthropic-base-url={{ .Values.anthropic.baseURL }}
        {{- end }}
        {{- if .Values.anthropic.model }}
        - --model={{ .Values.anthropic.model }}
        {{- end }}
        {{- if .Values.prometheus.url }}
        - --prometheus-url={{ .Values.prometheus.url }}
        {{- end }}
        {{- if .Values.prometheus.agentURL }}
        - --agent-prometheus-url={{ .Values.prometheus.agentURL }}
        {{- end }}
        {{- if .Values.prometheus.metricsQueries }}
        - --metrics-queries={{ .Values.prometheus.metricsQueries }}
        {{- end }}
        {{- if .Values.notifications.dedupTTL }}
        - --notify-dedup-ttl={{ .Values.notifications.dedupTTL }}
        {{- end }}
        {{- if .Values.notifications.webhook.enabled }}
        - --notify-webhook-url={{ .Values.notifications.webhook.url }}
        {{- if .Values.notifications.webhook.secret }}
        - --notify-webhook-secret={{ .Values.notifications.webhook.secret }}
        {{- end }}
        {{- end }}
        {{- if .Values.notifications.slack.enabled }}
        - --notify-slack-url={{ .Values.notifications.slack.webhookURL }}
        {{- end }}
        {{- if .Values.notifications.dingtalk.enabled }}
        - --notify-dingtalk-url={{ .Values.notifications.dingtalk.webhookURL }}
        {{- if .Values.notifications.dingtalk.secret }}
        - --notify-dingtalk-secret={{ .Values.notifications.dingtalk.secret }}
        {{- end }}
        {{- end }}
        {{- if .Values.notifications.feishu.enabled }}
        - --notify-feishu-url={{ .Values.notifications.feishu.webhookURL }}
        {{- if .Values.notifications.feishu.secret }}
        - --notify-feishu-secret={{ .Values.notifications.feishu.secret }}
        {{- end }}
        {{- end }}
        {{- $langfuseSecret := "" }}
        {{- with .Values.langfuse }}
          {{- if and .selfHosted .selfHosted.enabled }}
            {{- $langfuseSecret = printf "%s-langfuse-credentials" $.Release.Name }}
          {{- else if .secretName }}
            {{- $langfuseSecret = .secretName }}
          {{- end }}
        {{- end }}
        {{- if $langfuseSecret }}
        - --langfuse-secret={{ $langfuseSecret }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /api/runs?limit=1
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/runs?limit=1
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
