apiVersion: k8sai.io/v1alpha1
kind: DiagnosticRun
metadata:
  name: prod-full-audit
  namespace: kube-agent-helper
spec:
  target:
    scope: namespace
    namespaces:
      - production
      - staging
  modelConfigRef: "prod-model"
  timeoutSeconds: 600
  outputLanguage: zh
  # Run every day at 08:00 (optional; omit for a one-time run)
  schedule: "0 8 * * *"
  historyLimit: 7
