# =============================================================================
# KubeDoctor Helm Chart Values
# Full reference: VALUES.md
# =============================================================================

# -- Number of controller replicas.
# Use 1 when backed by SQLite (no HA support). Increase only with an external DB.
replicaCount: 1

# =============================================================================
# Container Images
# =============================================================================
image:
  # -- Controller container image (repository:tag).
  controller: ghcr.io/kube-agent-helper/controller:latest
  # -- Agent runtime image. The Translator spawns this image as a Job for each
  # diagnostic run.
  agent: ghcr.io/kube-agent-helper/agent-runtime:latest
  # -- Dashboard (Next.js) container image.
  dashboard: ghcr.io/kube-agent-helper/dashboard:latest
  # -- Image pull policy applied to all containers.
  # Valid values: Always, IfNotPresent, Never
  pullPolicy: IfNotPresent

# =============================================================================
# Dashboard Configuration
# =============================================================================
dashboard:
  # -- Enable the Next.js dashboard deployment.
  # Set to false on spoke clusters in a multi-cluster setup.
  enabled: true
  # -- Number of dashboard replicas.
  replicas: 1
  # -- Container port the dashboard listens on.
  port: 3000
  # -- Resource requests and limits for the dashboard container.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# =============================================================================
# Controller Configuration
# =============================================================================
controller:
  # -- Listen address for the controller HTTP API (host:port).
  httpAddr: ":8080"
  # -- Path to the SQLite database file inside the container.
  # Must reside on a persistent volume when persistence.enabled=true.
  dbPath: "/data/kube-agent-helper.db"
  # -- Base URL that agent Pods use to call back to the controller API.
  # If empty, defaults to http://<release>.<namespace>.svc.cluster.local:8080
  controllerURL: ""

# =============================================================================
# Controller Resources
# =============================================================================
# -- Resource requests and limits for the controller container.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# =============================================================================
# Database Persistence
# =============================================================================
persistence:
  # -- Create a PersistentVolumeClaim for the SQLite database.
  # When false, an emptyDir volume is used (data is lost on pod restart).
  enabled: true
  # -- Requested storage size for the PVC.
  size: 1Gi
  # -- StorageClass name. Empty string uses the cluster default StorageClass.
  # Examples: gp3 (AWS), premium-rwo (GKE), managed-premium (AKS)
  storageClass: ""

# =============================================================================
# Anthropic / LLM Provider
# =============================================================================
anthropic:
  # -- Name of the Kubernetes Secret containing the Anthropic API key.
  # Create it with: kubectl create secret generic anthropic-credentials \
  #   --from-literal=apiKey=sk-ant-...
  secretName: "anthropic-credentials"
  # -- Key within the Secret that holds the API key value.
  secretKey: "apiKey"
  # -- Custom API endpoint for Anthropic or a compatible proxy.
  # Leave empty to use the default Anthropic API URL.
  # Example: https://internal-llm-proxy.corp.example.com
  baseURL: ""
  # -- Model name override. Empty uses the controller built-in default.
  # Example: claude-3-5-sonnet-20241022
  model: ""

# =============================================================================
# Prometheus Integration
# =============================================================================
prometheus:
  # -- Prometheus server URL for background metric scraping by EventCollector.
  # Example: http://prometheus-server.monitoring:9090
  url: ""
  # -- Prometheus URL injected into agent Pods. Defaults to prometheus.url if
  # empty. Useful when agents need a different network path to Prometheus.
  agentURL: ""
  # -- Comma-separated PromQL queries for the EventCollector to scrape.
  # Example: "up,node_cpu_seconds_total,container_memory_usage_bytes"
  metricsQueries: ""

# =============================================================================
# Metrics (Prometheus)
# =============================================================================
metrics:
  # -- Enable the /metrics endpoint on the controller for Prometheus scraping.
  enabled: true
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor resource.
    # Requires the Prometheus Operator CRDs to be installed.
    enabled: false
    # -- Scrape interval for the ServiceMonitor.
    interval: "30s"

# =============================================================================
# Ingress
# =============================================================================
ingress:
  # -- Create an Ingress resource for the dashboard.
  enabled: false
  # -- Ingress class name (e.g. nginx, alb, traefik).
  className: ""
  # -- Hostname for the Ingress rule.
  host: "kube-agent-helper.local"
  # -- Extra annotations on the Ingress resource.
  # Example:
  #   annotations:
  #     cert-manager.io/cluster-issuer: letsencrypt
  #     nginx.ingress.kubernetes.io/ssl-redirect: "true"
  annotations: {}
  # -- TLS configuration. Each entry needs hosts (list) and secretName.
  # Example:
  #   tls:
  #     - hosts:
  #         - kube-agent-helper.example.com
  #       secretName: kah-tls
  tls: []

# =============================================================================
# Notifications / Webhooks
# =============================================================================
notifications:
  # -- Deduplication window. Events with the same (type, resource) within this
  # window are sent only once.
  dedupTTL: "5m"
  webhook:
    # -- Enable generic JSON webhook notifications.
    enabled: false
    # -- Webhook endpoint URL.
    url: ""
    # -- HMAC-SHA256 secret for signing payloads (X-Signature-256 header).
    secret: ""
  slack:
    # -- Enable Slack incoming webhook notifications.
    enabled: false
    # -- Slack incoming webhook URL.
    webhookURL: ""
  dingtalk:
    # -- Enable DingTalk robot webhook notifications.
    enabled: false
    # -- DingTalk robot webhook URL.
    webhookURL: ""
    # -- DingTalk signing secret (timestamp + HMAC-SHA256).
    secret: ""
  feishu:
    # -- Enable Feishu (Lark) bot webhook notifications.
    enabled: false
    # -- Feishu bot webhook URL.
    webhookURL: ""
    # -- Feishu signing secret (timestamp + HMAC-SHA256).
    secret: ""

# =============================================================================
# Grafana Dashboard
# =============================================================================
grafana:
  dashboard:
    # -- Create a ConfigMap with the Grafana dashboard JSON.
    # The ConfigMap is labeled with grafana_dashboard: "1" so the Grafana
    # sidecar (kube-prometheus-stack) auto-provisions it.
    enabled: false
    # -- Extra annotations on the dashboard ConfigMap.
    annotations: {}

# ── Langfuse LLM Observability ─────────────────────────────────────────────
# Langfuse traces every LLM turn (input/output tokens, tool calls, latency).
#
# Two usage patterns:
#   A) Cloud / external Langfuse: create a Secret manually with keys
#      publicKey / secretKey / host, then set secretName to that Secret name.
#   B) Self-hosted: set selfHosted.enabled=true to deploy Langfuse + Postgres
#      in-cluster. After first deploy, visit the Langfuse UI, create a project,
#      copy the API keys, then fill in selfHosted.credentials and re-deploy.
#
# Leave secretName empty to disable tracing entirely.
langfuse:
  # Name of the K8s Secret containing Langfuse API keys (publicKey / secretKey).
  # The optional "host" key overrides the default https://cloud.langfuse.com.
  # When selfHosted.enabled=true this is set automatically to the generated Secret.
  secretName: ""

  # Self-hosted Langfuse deployment (PostgreSQL + Langfuse Server)
  selfHosted:
    enabled: false
    image: langfuse/langfuse:2

    # Fill in after creating a project in the Langfuse UI (step 2 above).
    credentials:
      publicKey: ""   # pk-lf-...
      secretKey: ""   # sk-lf-...

    # Internal Postgres secrets — CHANGE ALL THREE before first deploy.
    postgresPassword: "langfuse-pg-password"
    nextauthSecret: "change-me-nextauth-secret"
    salt: "change-me-salt-value"

    persistence:
      size: 2Gi
      storageClass: ""

    resources:
      server:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      postgres:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
