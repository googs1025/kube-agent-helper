replicaCount: 1

image:
  controller: ghcr.io/kube-agent-helper/controller:latest
  agent: ghcr.io/kube-agent-helper/agent-runtime:latest
  dashboard: ghcr.io/kube-agent-helper/dashboard:latest
  pullPolicy: IfNotPresent

dashboard:
  enabled: true
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

controller:
  httpAddr: ":8080"
  dbPath: "/data/kube-agent-helper.db"
  controllerURL: ""  # if empty, defaults to http://<release>.<namespace>.svc.cluster.local:8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

anthropic:
  secretName: "anthropic-credentials"
  secretKey: "apiKey"
  baseURL: ""
  model: ""

prometheus:
  url: ""              # Prometheus URL for background metric scraping (e.g. http://prometheus:9090)
  agentURL: ""         # Prometheus URL injected into agent pods (defaults to url if empty)
  metricsQueries: ""   # Comma-separated PromQL queries to scrape

ingress:
  enabled: false
  className: ""
  host: "kube-agent-helper.local"
  annotations: {}
  tls: []
