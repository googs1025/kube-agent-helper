name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -race -count=1 -timeout=120s

  envtest:
    name: Integration Tests (envtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Download kubebuilder assets
        run: setup-envtest use --bin-dir ${{ github.workspace }}/bin/envtest

      - name: Run envtest
        run: go test ./test/envtest/... -v -count=1 -timeout=120s

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build controller
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/controller ./cmd/controller

      - name: Build MCP server
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/k8s-mcp-server ./cmd/main.go

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm
