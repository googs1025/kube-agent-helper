---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: diagnosticruns.k8sai.io
spec:
  group: k8sai.io
  names:
    kind: DiagnosticRun
    listKind: DiagnosticRunList
    plural: diagnosticruns
    singular: diagnosticrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.nextRunAt
      name: NextRun
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              clusterRef:
                description: |-
                  ClusterRef is the name of a ClusterConfig CR in the same namespace.
                  When empty, the local (controller) cluster is used.
                type: string
              fallbackModelConfigRefs:
                type: array
                items:
                  type: string
                description: "Ordered list of fallback ModelConfig names tried when primary fails."
              historyLimit:
                default: 10
                description: HistoryLimit is the maximum number of completed child
                  runs to retain.
                format: int32
                type: integer
              modelConfigRef:
                type: string
              outputLanguage:
                enum:
                - zh
                - en
                type: string
              schedule:
                description: |-
                  Schedule is a cron expression for periodic runs, e.g. "0 * * * *".
                  When set, this DiagnosticRun acts as a template; child runs are created automatically.
                type: string
              skills:
                items:
                  type: string
                type: array
              target:
                properties:
                  labelSelector:
                    additionalProperties:
                      type: string
                    type: object
                  namespaces:
                    items:
                      type: string
                    type: array
                  scope:
                    enum:
                    - namespace
                    - cluster
                    type: string
                required:
                - scope
                type: object
              timeoutSeconds:
                format: int32
                type: integer
            required:
            - modelConfigRef
            - target
            type: object
          status:
            properties:
              activeRuns:
                description: ActiveRuns lists the names of child DiagnosticRuns created
                  by this scheduled run.
                items:
                  type: string
                type: array
              completedAt:
                format: date-time
                type: string
              findingCounts:
                additionalProperties:
                  type: integer
                type: object
              findings:
                items:
                  description: FindingSummary is a compact representation of a finding
                    stored in CR status.
                  properties:
                    dimension:
                      type: string
                    resourceKind:
                      type: string
                    resourceName:
                      type: string
                    resourceNamespace:
                      type: string
                    severity:
                      type: string
                    suggestion:
                      type: string
                    title:
                      type: string
                  required:
                  - dimension
                  - severity
                  - title
                  type: object
                type: array
              lastRunAt:
                description: LastRunAt is the time the last child run was created
                  (only set when schedule is used).
                format: date-time
                type: string
              message:
                type: string
              nextRunAt:
                description: NextRunAt is the scheduled time for the next child run.
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              reportId:
                type: string
              startedAt:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
