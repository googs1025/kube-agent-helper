<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 730" style="background:#0f172a">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
    <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Dashboard → Controller HTTP Server -->
  <path d="M 230 32 L 490 32 Q 500 32 500 42 L 500 140" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>
  <text x="360" y="26" fill="#94a3b8" font-size="8" text-anchor="middle">/api/*</text>

  <!-- kubectl → Controller Reconcilers -->
  <path d="M 230 73 L 320 73 Q 330 73 330 83 L 330 140" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>
  <text x="288" y="67" fill="#94a3b8" font-size="8" text-anchor="middle">CR</text>

  <!-- CRDs → Controller (watch) -->
  <path d="M 230 120 L 254 120 Q 264 120 264 130 L 264 140" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead-cyan)"/>
  <text x="246" y="136" fill="#22d3ee" font-size="6">watch</text>

  <!-- Controller → Agent Pod (create Job) -->
  <line x1="420" y1="270" x2="420" y2="346" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>
  <text x="432" y="312" fill="#94a3b8" font-size="8">Create Job</text>

  <!-- Controller → Fix Pod (create Job) -->
  <path d="M 640 270 L 640 310 Q 640 320 650 320 L 830 320 Q 840 320 840 330 L 840 346" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>
  <text x="740" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">Create Job</text>

  <!-- Agent Pod → Controller (POST findings) -->
  <path d="M 290 448 L 290 480 Q 290 490 280 490 L 260 490 Q 250 490 250 480 L 250 270" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-rose)"/>
  <text x="310" y="486" fill="#fb7185" font-size="7">POST findings</text>

  <!-- MCP client → MCP server (stdio) -->
  <line x1="480" y1="434" x2="480" y2="503" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
  <text x="492" y="472" fill="#94a3b8" font-size="7">stdio</text>

  <!-- MCP server → K8s API -->
  <line x1="450" y1="575" x2="450" y2="623" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>
  <text x="462" y="602" fill="#94a3b8" font-size="7">API</text>

  <!-- MCP server → Prometheus -->
  <line x1="550" y1="540" x2="658" y2="540" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="604" y="534" fill="#94a3b8" font-size="7">PromQL</text>

  <!-- Agent Pod → Anthropic API (Claude) -->
  <line x1="550" y1="390" x2="658" y2="390" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="604" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">Streaming SSE</text>

  <!-- Fix Pod → Anthropic API -->
  <path d="M 840 408 L 840 430 Q 840 440 830 440 L 780 440 Q 770 440 770 430 L 770 414" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="810" y="452" fill="#94a3b8" font-size="7" text-anchor="middle">LLM</text>

  <!-- EventCollector → Prometheus (dashed) -->
  <path d="M 678 234 L 720 234 Q 730 234 730 244 L 730 516" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="742" y="400" fill="#fbbf24" font-size="7">scrape</text>

  <!-- K8s CLUSTER BOUNDARY -->
  <rect x="220" y="85" width="790" height="580" rx="12" fill="rgba(251, 191, 36, 0.03)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="236" y="103" fill="#fbbf24" font-size="10" font-weight="600">Kubernetes Cluster</text>

  <!-- Dashboard -->
  <rect x="20" y="15" width="210" height="34" rx="6" fill="#0f172a"/>
  <rect x="20" y="15" width="210" height="34" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="125" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="125" y="43" fill="#94a3b8" font-size="8" text-anchor="middle">Next.js :3000</text>

  <!-- kubectl -->
  <rect x="20" y="56" width="210" height="34" rx="6" fill="#0f172a"/>
  <rect x="20" y="56" width="210" height="34" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="125" y="71" fill="white" font-size="11" font-weight="600" text-anchor="middle">kubectl / User</text>
  <text x="125" y="84" fill="#94a3b8" font-size="8" text-anchor="middle">kubectl apply CR</text>

  <!-- CONTROLLER -->
  <rect x="240" y="110" width="560" height="160" rx="8" fill="#0f172a"/>
  <rect x="240" y="110" width="560" height="160" rx="8" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="130" fill="white" font-size="13" font-weight="700" text-anchor="middle">Controller (Go) :8080</text>

  <!-- Reconcilers -->
  <rect x="255" y="142" width="155" height="68" rx="5" fill="#0f172a"/>
  <rect x="255" y="142" width="155" height="68" rx="5" fill="rgba(6, 78, 59, 0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="332" y="156" fill="white" font-size="9" font-weight="600" text-anchor="middle">5 Reconcilers</text>
  <text x="332" y="169" fill="#94a3b8" font-size="7" text-anchor="middle">DiagnosticRun</text>
  <text x="332" y="180" fill="#94a3b8" font-size="7" text-anchor="middle">DiagnosticFix / DiagnosticSkill</text>
  <text x="332" y="191" fill="#94a3b8" font-size="7" text-anchor="middle">ModelConfig / ScheduledRun</text>

  <!-- HTTP Server -->
  <rect x="422" y="142" width="155" height="60" rx="5" fill="#0f172a"/>
  <rect x="422" y="142" width="155" height="60" rx="5" fill="rgba(6, 78, 59, 0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="500" y="158" fill="white" font-size="9" font-weight="600" text-anchor="middle">HTTP Server</text>
  <text x="500" y="172" fill="#94a3b8" font-size="7" text-anchor="middle">/api/runs /api/skills</text>
  <text x="500" y="183" fill="#94a3b8" font-size="7" text-anchor="middle">/api/fixes /api/events</text>
  <text x="500" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">/api/k8s/resources</text>

  <!-- Translator -->
  <rect x="590" y="142" width="100" height="60" rx="5" fill="#0f172a"/>
  <rect x="590" y="142" width="100" height="60" rx="5" fill="rgba(6, 78, 59, 0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="640" y="158" fill="white" font-size="9" font-weight="600" text-anchor="middle">Translator</text>
  <text x="640" y="172" fill="#94a3b8" font-size="7" text-anchor="middle">CR → Job</text>
  <text x="640" y="183" fill="#94a3b8" font-size="7" text-anchor="middle">SA + RBAC</text>
  <text x="640" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">ConfigMap</text>

  <!-- SQLite -->
  <rect x="255" y="212" width="180" height="44" rx="5" fill="#0f172a"/>
  <rect x="255" y="212" width="180" height="44" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="345" y="230" fill="white" font-size="10" font-weight="600" text-anchor="middle">SQLite</text>
  <text x="345" y="248" fill="#94a3b8" font-size="7" text-anchor="middle">runs / findings / fixes / events / metrics</text>

  <!-- EventCollector -->
  <rect x="458" y="212" width="220" height="44" rx="5" fill="#0f172a"/>
  <rect x="458" y="212" width="220" height="44" rx="5" fill="rgba(251, 146, 60, 0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="568" y="230" fill="white" font-size="9" font-weight="600" text-anchor="middle">EventCollector</text>
  <text x="568" y="246" fill="#94a3b8" font-size="7" text-anchor="middle">K8s Warning Events + Prometheus Metric Snapshots</text>

  <!-- AGENT POD -->
  <rect x="280" y="348" width="270" height="100" rx="8" fill="#0f172a"/>
  <rect x="280" y="348" width="270" height="100" rx="8" fill="rgba(136, 19, 55, 0.25)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="415" y="367" fill="white" font-size="11" font-weight="600" text-anchor="middle">Diagnostic Agent Pod</text>
  <text x="415" y="382" fill="#94a3b8" font-size="8" text-anchor="middle">python -m runtime.main</text>

  <!-- Orchestrator inside agent -->
  <rect x="292" y="394" width="120" height="40" rx="4" fill="#0f172a"/>
  <rect x="292" y="394" width="120" height="40" rx="4" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="352" y="410" fill="white" font-size="8" font-weight="600" text-anchor="middle">Orchestrator</text>
  <text x="352" y="422" fill="#94a3b8" font-size="7" text-anchor="middle">Multi-turn Loop</text>

  <!-- MCP Client inside agent -->
  <rect x="422" y="394" width="116" height="40" rx="4" fill="#0f172a"/>
  <rect x="422" y="394" width="116" height="40" rx="4" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="480" y="410" fill="white" font-size="8" font-weight="600" text-anchor="middle">MCP Client</text>
  <text x="480" y="422" fill="#94a3b8" font-size="7" text-anchor="middle">JSON-RPC stdio</text>

  <!-- MCP SERVER -->
  <rect x="350" y="505" width="200" height="70" rx="6" fill="#0f172a"/>
  <rect x="350" y="505" width="200" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="524" fill="white" font-size="10" font-weight="600" text-anchor="middle">k8s-mcp-server</text>
  <text x="450" y="540" fill="#94a3b8" font-size="8" text-anchor="middle">16 MCP Tools (Go)</text>
  <text x="450" y="554" fill="#a78bfa" font-size="7" text-anchor="middle">kubectl_get | logs | describe | top</text>
  <text x="450" y="566" fill="#a78bfa" font-size="7" text-anchor="middle">prometheus_query | alerts | events</text>

  <!-- FIX GENERATOR POD -->
  <rect x="740" y="348" width="200" height="60" rx="8" fill="#0f172a"/>
  <rect x="740" y="348" width="200" height="60" rx="8" fill="rgba(136, 19, 55, 0.25)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="840" y="370" fill="white" font-size="11" font-weight="600" text-anchor="middle">Fix Generator Pod</text>
  <text x="840" y="386" fill="#94a3b8" font-size="8" text-anchor="middle">Single LLM call → patch JSON</text>

  <!-- Anthropic API -->
  <rect x="660" y="370" width="110" height="44" rx="6" fill="#0f172a"/>
  <rect x="660" y="370" width="110" height="44" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="715" y="389" fill="white" font-size="10" font-weight="600" text-anchor="middle">Claude API</text>
  <text x="715" y="403" fill="#94a3b8" font-size="8" text-anchor="middle">Anthropic</text>

  <!-- Prometheus -->
  <rect x="660" y="518" width="130" height="44" rx="6" fill="#0f172a"/>
  <rect x="660" y="518" width="130" height="44" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="725" y="537" fill="white" font-size="10" font-weight="600" text-anchor="middle">Prometheus</text>
  <text x="725" y="551" fill="#94a3b8" font-size="8" text-anchor="middle">:9090 (optional)</text>

  <!-- K8s API Server -->
  <rect x="350" y="625" width="200" height="40" rx="6" fill="#0f172a"/>
  <rect x="350" y="625" width="200" height="40" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="644" fill="white" font-size="10" font-weight="600" text-anchor="middle">K8s API Server</text>
  <text x="450" y="657" fill="#94a3b8" font-size="8" text-anchor="middle">Pods, Deployments, Events...</text>

  <!-- CRDs -->
  <rect x="20" y="97" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="20" y="97" width="210" height="46" rx="6" fill="rgba(8, 51, 68, 0.5)" stroke="#22d3ee" stroke-width="2"/>
  <text x="125" y="112" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">4 CRDs (k8sai.io/v1alpha1)</text>
  <text x="125" y="126" fill="white" font-size="7" text-anchor="middle">DiagnosticRun · DiagnosticFix</text>
  <text x="125" y="138" fill="white" font-size="7" text-anchor="middle">DiagnosticSkill · ModelConfig</text>

  <!-- LEGEND -->
  <text x="240" y="700" fill="white" font-size="10" font-weight="600">Legend</text>
  <rect x="300" y="691" width="14" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="318" y="699" fill="#94a3b8" font-size="8">Controller</text>
  <rect x="380" y="691" width="14" height="10" rx="2" fill="rgba(136, 19, 55, 0.25)" stroke="#fb7185" stroke-width="1"/>
  <text x="398" y="699" fill="#94a3b8" font-size="8">Agent Pod</text>
  <rect x="465" y="691" width="14" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="483" y="699" fill="#94a3b8" font-size="8">MCP / DB</text>
  <rect x="540" y="691" width="14" height="10" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="558" y="699" fill="#94a3b8" font-size="8">External</text>
  <rect x="615" y="691" width="14" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="633" y="699" fill="#94a3b8" font-size="8">Frontend / CRD</text>
  <line x1="720" y1="696" x2="736" y2="696" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="740" y="699" fill="#94a3b8" font-size="8">Findings callback</text>
  <rect x="240" y="707" width="14" height="10" rx="2" fill="transparent" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="258" y="715" fill="#94a3b8" font-size="8">Cluster boundary</text>
</svg>